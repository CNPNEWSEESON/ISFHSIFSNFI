<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verified — SERSEX</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-dark:#12010e;
  --bg-top:#2b041b;
  --bg-bottom:#0f0211;
  --accent:#ff557f;
  --accent-soft:#ff96b8;
  --accent-glow:rgba(255,85,127,0.24);
  --text:#ffe8f2;
  --muted:#f7c9d8;
  --card:#190316;
}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:radial-gradient(circle at top left, rgba(255,85,127,0.16) 0%, transparent 25%),radial-gradient(circle at bottom right, rgba(255,150,184,0.14) 0%, transparent 22%),linear-gradient(180deg,var(--bg-top),var(--bg-bottom));color:var(--text);position:relative;}
#bubble-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.75}
.scene{position:relative;z-index:2;width:min(560px,96vw);max-width:560px;margin:0 auto;padding:32px 16px;display:flex;justify-content:center;}
.glow-circle{position:absolute;inset:0;margin:auto;max-width:520px;height:520px;border-radius:50%;background:radial-gradient(circle, rgba(255,85,127,0.16) 0%, transparent 45%);filter:blur(30px);pointer-events:none;}
.card{position:relative;width:100%;background:rgba(16,3,15,0.96);border-radius:42px;padding:32px 28px 28px;overflow:hidden;border:1px solid rgba(255,85,127,0.14);box-shadow:0 40px 110px rgba(0,0,0,0.45);}
.card::before{content:'';position:absolute;inset:0;border-radius:42px;padding:1px;background:linear-gradient(135deg,rgba(255,85,127,0.16),rgba(255,150,184,0.08));-webkit-mask:linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0);pointer-events:none;}
.brandline{position:absolute;top:22px;left:22px;z-index:2;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,85,127,0.16);font-size:.75rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-soft);}
.card-head{text-align:center;position:relative;z-index:1;margin-bottom:22px}
.pill{display:inline-flex;padding:10px 18px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;background:rgba(255,85,127,0.12);color:var(--accent-soft);border:1px solid rgba(255,85,127,0.18);}
h1{margin:18px auto 10px;font-size:2.2rem;line-height:1.05;color:#fff;text-shadow:0 8px 20px rgba(255,85,127,0.16);}
p{width:100%;margin:0 auto;font-size:1rem;color:var(--muted);line-height:1.75;word-break:break-word;max-width:92%;}
.status-strip{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:0 auto 24px;max-width:100%;padding:12px 14px;background:rgba(255,85,127,0.08);border:1px solid rgba(255,85,127,0.14);border-radius:999px;color:var(--muted);}
.status-pill{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:999px;background:rgba(255,85,127,0.14);font-size:.8rem;font-weight:700;color:#fff;}
.hero{display:grid;grid-template-columns:96px 1fr;gap:18px;align-items:center;position:relative;z-index:1;margin-bottom:28px;}
.avatar-frame{position:relative;width:96px;height:96px;border-radius:32px;display:grid;place-items:center;background:linear-gradient(180deg,rgba(255,85,127,0.18),rgba(255,150,184,0.1));border:1px solid rgba(255,85,127,0.18);box-shadow:0 0 45px rgba(255,85,127,0.14);}
.avatar-ring{position:absolute;inset:10px;border-radius:22px;border:2px dashed rgba(255,85,127,0.22);}
#av-container{position:relative;width:72px;height:72px;border-radius:22px;overflow:hidden;background:linear-gradient(135deg,#ffbfd9,#ff7eb9);display:grid;place-items:center;}
.av-img{width:100%;height:100%;object-fit:cover;display:block}
.av-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;background:linear-gradient(135deg,rgba(255,255,255,0.12),rgba(255,255,255,0.04));}
.hero-text{display:flex;flex-direction:column;gap:6px;}
.hero-subtitle{font-size:.8rem;font-weight:700;text-transform:uppercase;color:var(--accent-soft);letter-spacing:.18em;}
.hero-text strong{font-size:1.75rem;line-height:1.1;color:#fff;}
.info-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-bottom:30px;}
.info-card{background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,85,127,0.03));border:1px solid rgba(255,85,127,0.12);border-radius:24px;padding:20px;display:flex;flex-direction:column;gap:12px;min-height:138px;transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;}
.info-card:hover{transform:translateY(-4px);box-shadow:0 24px 60px rgba(255,85,127,0.12);border-color:rgba(255,85,127,0.22);}
.info-icon{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;font-size:1.2rem;background:rgba(255,85,127,0.14);color:#ffbad2;}
.info-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.15em;margin-bottom:2px;}
.info-value{font-size:1.1rem;font-weight:800;color:#fff;}
.footer{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;padding:20px 22px;background:rgba(255,85,127,0.07);border:1px solid rgba(255,85,127,0.12);border-radius:26px;color:var(--muted);word-break:break-word;}
.footer-text{display:block;max-width:100%;word-break:break-word;}
.footer-text strong{color:#fff;}
.footer-id{font-size:.85rem;letter-spacing:.06em;color:var(--accent-soft);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:999px;background:linear-gradient(135deg,#ff869d,#ff2e76);color:#fff;font-weight:700;text-decoration:none;box-shadow:0 14px 32px rgba(255,85,127,0.18);transition:transform .2s ease,box-shadow .2s ease;}
.btn:hover{transform:translateY(-1px);box-shadow:0 18px 40px rgba(255,85,127,0.25);}
@media(max-width:520px){.hero{grid-template-columns:1fr;justify-items:center;text-align:center;}.info-grid{grid-template-columns:1fr;}.footer{flex-direction:column;align-items:center;}.card{padding:28px 20px;}.brandline{left:18px;top:18px;}}
</style>
</head>
<body>
<canvas id="bubble-canvas"></canvas>
<div class="scene">
  <div class="glow-circle"></div>
  <div class="card">
    <div class="card-head">
      <span class="pill">Verified</span>
      <h1>ยืนยันสำเร็จแล้ว</h1>
      <p>ข้อมูลของท่านถูกบันทึกไว้ในระบบสุ่มรับยศแล้ว</p>
    </div>
    <div class="hero">
      <div class="avatar-frame">
        <div class="avatar-ring"></div>
        <div id="av-container"></div>
      </div>
      <div class="hero-text">
        <span class="hero-subtitle">USER VERIFIED</span>
        <strong id="uname">Unknown</strong>
      </div>
    </div>
    <div class="info-grid">
      <div class="info-card">
        <div class="info-icon">✅</div>
        <div>
          <div class="info-label">สถานะ</div>
          <div class="info-value">ยืนยันสำเร็จ</div>
        </div>
      </div>
      <div class="info-card">
        <div class="info-icon">🔐</div>
        <div>
          <div class="info-label">User ID</div>
          <div class="info-value" id="uid">—</div>
        </div>
      </div>
      <div class="info-card">
        <div class="info-icon">💬</div>
        <div>
          <div class="info-label">Discord</div>
          <div class="info-value">SerSex</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const p=new URLSearchParams(window.location.search);
const username=p.get('username')||'Unknown User';
const userId=p.get('id')||'';
const avatarUrl=p.get('avatar')||'';
const avc=document.getElementById('av-container');
function setAvatar(src){avc.innerHTML='';if(src){const img=document.createElement('img');img.src=src;img.alt=username;img.className='av-img';img.onerror=showFb;avc.appendChild(img);}else showFb();}
function showFb(){avc.innerHTML='';const fb=document.createElement('div');fb.className='av-fb';fb.textContent=username.charAt(0).toUpperCase();avc.appendChild(fb);}
setAvatar(avatarUrl);
document.getElementById('uname').textContent=username;
if(userId){document.getElementById('uid').textContent=userId;document.getElementById('foot-id').textContent='ID '+userId.slice(-6);}
const canvas=document.getElementById('bubble-canvas');
const ctx=canvas.getContext('2d');
let W,H,bubbles=[];
const COLORS=['rgba(255,85,127,','rgba(255,149,184,','rgba(255,113,150,','rgba(255,196,215,'];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
function makeBubble(){const r=10+Math.random()*38;return{x:Math.random()*W,y:H+r+Math.random()*120,r,color:COLORS[Math.floor(Math.random()*COLORS.length)],alpha:0.04+Math.random()*0.09,speed:0.2+Math.random()*0.65,dx:(Math.random()-.5)*0.45,wobble:Math.random()*Math.PI*2,wobbleSpeed:0.008+Math.random()*0.011};}
function initBubbles(){bubbles=[];for(let i=0;i<20;i++){const b=makeBubble();b.y=Math.random()*H;bubbles.push(b);}}
function drawBubble(b){ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);const g=ctx.createRadialGradient(b.x-b.r*.25,b.y-b.r*.25,b.r*.08,b.x,b.y,b.r);g.addColorStop(0,b.color+(b.alpha*1.8)+')');g.addColorStop(1,b.color+'0)');ctx.fillStyle=g;ctx.fill();ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.strokeStyle=b.color+(b.alpha*2)+')';ctx.lineWidth=1;ctx.stroke();ctx.beginPath();ctx.arc(b.x-b.r*.26,b.y-b.r*.26,b.r*.18,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.14)';ctx.fill();}
function tick(){ctx.clearRect(0,0,W,H);bubbles.forEach(b=>{b.wobble+=b.wobbleSpeed;b.x+=b.dx+Math.sin(b.wobble)*0.35;b.y-=b.speed;if(b.y<-b.r*2)Object.assign(b,makeBubble(),{y:H+b.r});drawBubble(b);});requestAnimationFrame(tick);}
resize();initBubbles();tick();
window.addEventListener('resize',()=>{resize();initBubbles();});
</script>
<script disable-devtool-auto="" src="./cnp-blocker.js" defer></script>
</body>
</html>
