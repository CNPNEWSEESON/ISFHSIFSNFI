<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SerSex — Error</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-dark:#12010e;
  --bg-top:#2b041b;
  --bg-bottom:#0f0211;
  --accent:#ff557f;
  --accent-soft:#ff96b8;
  --text:#ffe8f2;
  --muted:#f7c9d8;
  --card:#190316;
}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:radial-gradient(circle at top left, rgba(255,85,127,0.16) 0%, transparent 25%),radial-gradient(circle at bottom right, rgba(255,150,184,0.14) 0%, transparent 22%),linear-gradient(180deg,var(--bg-top),var(--bg-bottom));color:var(--text);position:relative;}
#bubble-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.75}
.scene{position:relative;z-index:2;width:min(540px,96vw);max-width:540px;margin:0 auto;padding:32px 16px;display:flex;justify-content:center;}
.glow-circle{position:absolute;inset:0;margin:auto;max-width:520px;height:520px;border-radius:50%;background:radial-gradient(circle, rgba(255,85,127,0.16) 0%, transparent 45%);filter:blur(30px);pointer-events:none;}
.card{position:relative;width:100%;background:rgba(16,3,15,0.96);border-radius:42px;padding:32px 28px 28px;overflow:hidden;border:1px solid rgba(255,85,127,0.14);box-shadow:0 40px 110px rgba(0,0,0,0.45);}
.card::before{content:'';position:absolute;inset:0;border-radius:42px;padding:1px;background:linear-gradient(135deg,rgba(255,85,127,0.16),rgba(255,150,184,0.08));-webkit-mask:linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0);pointer-events:none;}
.brandline{position:absolute;top:22px;left:22px;z-index:2;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,85,127,0.16);font-size:.75rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-soft);}
.card-head{text-align:center;position:relative;z-index:1;margin-bottom:22px}
.pill{display:inline-flex;padding:10px 18px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;background:rgba(255,85,127,0.12);color:var(--accent-soft);border:1px solid rgba(255,85,127,0.18);}
h1{margin:18px auto 10px;font-size:2.2rem;line-height:1.05;color:#fff;text-shadow:0 8px 20px rgba(255,85,127,0.16);}
p{width:100%;margin:0 auto;font-size:1rem;color:var(--muted);line-height:1.75;word-break:break-word;max-width:92%;}
.status-strip{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:0 auto 24px;max-width:100%;padding:12px 14px;background:rgba(255,85,127,0.08);border:1px solid rgba(255,85,127,0.14);border-radius:999px;color:var(--muted);}
.status-pill{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:999px;background:rgba(255,85,127,0.14);font-size:.8rem;font-weight:700;color:#fff;}
.hero{display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;margin-bottom:28px;}
.icon-wrap{position:relative;width:88px;height:88px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:pop .6s .2s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
.icon-wrap::before{content:'';position:absolute;inset:-10px;border-radius:50%;border:1.5px solid transparent;border-top-color:var(--accent);border-left-color:rgba(255,130,176,0.45);animation:spin 3s linear infinite;}
.icon-wrap::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(255,85,127,0.15);}
@keyframes spin{to{transform:rotate(360deg)}}
.icon-inner{width:72px;height:72px;border-radius:50%;background:radial-gradient(circle,rgba(255,85,127,0.14) 0%,rgba(255,85,127,0.04) 60%,transparent 100%);border:1px solid rgba(255,85,127,0.22);display:flex;align-items:center;justify-content:center;font-size:30px;animation:shake .5s .4s ease both;}
@keyframes shake{0%{transform:rotate(0)}20%{transform:rotate(-10deg)}40%{transform:rotate(10deg)}60%{transform:rotate(-6deg)}80%{transform:rotate(4deg)}100%{transform:rotate(0)}}
.message{font-size:1rem;color:var(--text);line-height:1.8;margin-bottom:16px;}
.details{font-size:.92rem;color:var(--muted);line-height:1.7;max-width:84%;}
.action-wrap{padding:20px 24px 24px;display:flex;flex-direction:column;gap:14px;animation:fadein .4s .45s both;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 24px;border-radius:999px;background:linear-gradient(135deg,#ff869d,#ff2e76);color:#fff;font-weight:700;text-decoration:none;box-shadow:0 16px 38px rgba(255,85,127,0.22);transition:transform .2s ease,box-shadow .2s ease;}
.btn:hover{transform:translateY(-2px);box-shadow:0 20px 46px rgba(255,85,127,0.28);}
.secondary-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 24px;border-radius:999px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,85,127,0.16);color:var(--accent-soft);font-weight:700;text-decoration:none;transition:transform .2s ease,background .2s ease;}
.secondary-btn:hover{transform:translateY(-2px);background:rgba(255,255,255,0.08);}
.footer-txt{text-align:center;font-size:10px;color:rgba(255,85,127,0.3);letter-spacing:.06em;text-transform:uppercase;margin-top:4px;}
.footer-txt span{color:rgba(255,85,127,0.5)}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:520px){.card{padding:26px 18px 24px;}.status-strip{padding:10px 12px;}.action-wrap{padding:18px 18px 22px;}.message{max-width:100%;}.details{max-width:100%;}}
</style>
</head>
<body>
<canvas id="bubble-canvas"></canvas>
<div class="scene">
  <div class="glow-circle"></div>
  <div class="card">
    <div class="card-head">
      <span class="pill">Verify Failed</span>
      <h1>เกิดข้อผิดพลาด</h1>
      <p class="message">การยืนยันไม่สำเร็จ กรุณาลองใหม่อีกครั้งหรือกลับไปที่ Discord เพื่อเริ่มใหม่</p>
    </div>
  </div>
</div>
<script>
const canvas=document.getElementById('bubble-canvas');
const ctx=canvas.getContext('2d');
let W,H,bubbles=[];
const COLORS=['rgba(255,85,127,','rgba(255,149,184,','rgba(255,113,150,','rgba(255,196,215,'];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
function makeBubble(){const r=10+Math.random()*42;return{x:Math.random()*W,y:H+r+Math.random()*150,r,color:COLORS[Math.floor(Math.random()*COLORS.length)],alpha:0.03+Math.random()*0.07,speed:0.2+Math.random()*0.6,dx:(Math.random()-.5)*0.3,wobble:Math.random()*Math.PI*2,wobbleSpeed:0.007+Math.random()*0.01};}
function initBubbles(){bubbles=[];for(let i=0;i<18;i++){const b=makeBubble();b.y=Math.random()*H;bubbles.push(b);}}
function drawBubble(b){ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);const g=ctx.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,b.r*.1,b.x,b.y,b.r);g.addColorStop(0,b.color+(b.alpha*1.8)+')');g.addColorStop(1,b.color+'0)');ctx.fillStyle=g;ctx.fill();ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.strokeStyle=b.color+(b.alpha*2)+')';ctx.lineWidth=1;ctx.stroke();ctx.beginPath();ctx.arc(b.x-b.r*.28,b.y-b.r*.28,b.r*.2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fill();}
function tick(){ctx.clearRect(0,0,W,H);bubbles.forEach(b=>{b.wobble+=b.wobbleSpeed;b.x+=b.dx+Math.sin(b.wobble)*0.4;b.y-=b.speed;if(b.y<-b.r*2)Object.assign(b,makeBubble(),{y:H+b.r});drawBubble(b);});requestAnimationFrame(tick);}
resize();initBubbles();tick();
window.addEventListener('resize',()=>{resize();initBubbles();});
</script>
<script disable-devtool-auto="" src="./cnp-blocker.js" defer></script>
</body>
</html>
